<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bolandio" />
  <meta name="theme-color" content="#0d0d1a" id="meta-theme-color" />
  <title>Bolandio</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar (desktop) / Top nav (mobile) -->
    <aside class="app-sidebar">
      <div class="sidebar-top">
        <h1 id="app-title">🌍 Bolandio</h1>
        <div class="header-actions">
          <button class="icon-btn lang-btn" id="btn-lang" title="Language">EN</button>
          <button class="icon-btn" id="btn-theme" title="切换主题">🌙</button>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="discover" id="tab-btn-discover">发现</button>
        <button class="tab" data-tab="favorites" id="tab-btn-favorites">收藏</button>
        <button class="tab" data-tab="history" id="tab-btn-history">历史</button>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="app-main">

      <!-- Discover Tab -->
      <div id="tab-discover" class="tab-content active">
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="text" placeholder="搜索电台名称..." />
          </div>
          <div class="select-wrap">
            <select id="filter-country"><option value="">全部国家</option></select>
          </div>
          <div class="select-wrap">
            <select id="filter-tag"><option value="">全部风格</option></select>
          </div>
          <button id="btn-search">搜索</button>
          <button id="btn-random" title="随机播放">🔀</button>
        </div>
        <div id="station-list" class="station-list"></div>
        <div id="load-more-wrap" class="load-more-wrap" style="display:none">
          <button id="btn-load-more">加载更多</button>
        </div>
      </div>

      <!-- Favorites Tab -->
      <div id="tab-favorites" class="tab-content">
        <div class="group-bar" id="group-bar">
          <button class="btn-add-group" id="btn-add-group" title="新建分组">+</button>
        </div>
        <div id="favorites-list" class="station-list">
          <div class="empty">还没有收藏，去发现页收藏喜欢的电台吧 ✨</div>
        </div>
      </div>

      <!-- History Tab -->
      <div id="tab-history" class="tab-content">
        <div class="history-header">
          <span id="history-count"></span>
          <button id="btn-clear-history"></button>
        </div>
        <div id="history-list" class="station-list"></div>
      </div>

    </main>

    <!-- Mini Player (bottom bar) -->
    <div id="player" class="player hidden">
      <div class="player-info" id="player-info-click">
        <img id="player-favicon" src="" alt="" style="display:none" />
        <div class="player-favicon-placeholder" id="player-favicon-placeholder">📻</div>
        <div class="player-text">
          <div id="player-name" class="player-name"></div>
          <div id="player-meta" class="player-meta"></div>
        </div>
      </div>
      <div class="player-controls">
        <button id="btn-random-mini" class="icon-btn" title="随机">🔀</button>
        <button id="btn-fav-player" class="btn-fav" title="收藏">♡</button>
        <button id="btn-play-pause" class="btn-play">▶</button>
      </div>
    </div>

  </div>

  <!-- Expanded Player -->
  <div id="player-expanded" class="player-expanded hidden">
    <div class="exp-bg" id="exp-bg"></div>
    <div class="exp-content">
      <button class="exp-close" id="exp-close">↓</button>
      <div class="exp-art-wrap">
        <img id="exp-favicon" src="" alt="" style="display:none" onerror="this.style.display='none';document.getElementById('exp-favicon-ph').style.display='flex'" />
        <div class="exp-favicon-ph" id="exp-favicon-ph">📻</div>
        <div class="exp-eq" id="exp-eq"><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="exp-info">
        <div class="exp-name" id="exp-name"></div>
        <div class="exp-meta" id="exp-meta"></div>
      </div>
      <div class="exp-main-controls">
        <button class="exp-ctrl-btn" id="exp-random">🔀</button>
        <button class="exp-play-btn" id="exp-play-pause">▶</button>
        <button class="exp-ctrl-btn" id="exp-fav">♡</button>
      </div>
      <div class="exp-actions">
        <div class="sleep-wrap">
          <select id="exp-sleep-select">
            <option value="0">定时关闭</option>
            <option value="15">15分钟</option>
            <option value="30">30分钟</option>
            <option value="60">60分钟</option>
            <option value="90">90分钟</option>
          </select>
          <span id="exp-sleep-countdown" class="sleep-countdown"></span>
        </div>
        <button class="exp-share-btn" id="exp-share">
          <span>📤</span><span id="exp-share-label">分享</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Group picker modal -->
  <div class="modal-overlay" id="modal-group-picker">
    <div class="modal-sheet">
      <div class="modal-title" id="modal-group-title">添加到分组</div>
      <div id="modal-group-options"></div>
      <div class="modal-input-row">
        <input class="modal-input" id="modal-new-group-input" placeholder="新建分组名称..." />
        <button class="modal-btn" id="modal-new-group-btn">创建</button>
      </div>
    </div>
  </div>

  <!-- New group modal -->
  <div class="modal-overlay" id="modal-new-group">
    <div class="modal-sheet">
      <div class="modal-title">新建分组</div>
      <div class="modal-input-row">
        <input class="modal-input" id="new-group-input" placeholder="分组名称..." />
        <button class="modal-btn" id="new-group-confirm-btn">创建</button>
      </div>
    </div>
  </div>

  <audio id="audio-player" preload="none"></audio>
  <script src="/app.js"></script>
</body>
</html>
